<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillBarter Signup</title>
<link rel="stylesheet" href="style/style-sing-up.css">
<script></script>
</head>

<body>

<div class="signup-container">

<h1>SkillBarter</h1>
<p>Create your account</p>

<form id="signupForm">
    <input type="text" id="name" placeholder="Full Name" required>
<input type="tel"placeholder="phone" required pattern="[0-9]{10}">
<input type="email" placeholder="Email" required >
<input type="password" placeholder="Password" minlength="8" required>

<input type="text" placeholder="Skills you can teach">
<input type="text" placeholder="Skills you want to learn">

<button type="submit">Create Account</button>

</form>

<br>
<p>Already have an account?</p>
<a href="login.html">Login</a>

</div>
</body>
</html>
